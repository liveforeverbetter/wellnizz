name: Production Readiness

on:
  pull_request:
  schedule:
    # 08:00 UTC daily. Portugal is UTC+0/+1 depending on DST.
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readiness:
    name: Review production readiness
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify bundled health skill
        run: npm run skill:verify

      - name: Validate Mintlify docs
        run: npm run docs:validate

      - name: Verify package contents
        run: npm run package:verify

      - name: Validate Compose configuration
        run: |
          cp .env.example .env
          docker compose config --quiet

      - name: Audit production dependencies
        run: npm audit --omit=dev
